name: Links

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "43 12 * * *"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          fail: true
          args: >
            -v
            --root-dir ${{ github.workspace }}
            --no-progress
            --cache
            --max-cache-age 2d
            --include-fragments
            --exclude 'api.hetzner.cloud'
            --exclude 'api.hetzner.com'
            --exclude 'https://docs.hetzner.cloud/reference/cloud#'
            --exclude 'https://docs.hetzner.cloud/reference/hetzner#'
            --exclude 'codecov.io'
            --exclude '169.254.169.254'
            --exclude 'https://www.hetzner.com/news/arm64-cloud/'
            '**/*.md'
